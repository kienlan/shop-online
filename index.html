<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SHOP ONLINE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🛒 SHOP ONLINE</h1>

<input type="text" id="search" placeholder="Tìm sản phẩm..." onkeyup="searchProduct()">

<a href="cart.html">🛒 Giỏ hàng</a>
</header>


<div class="products">

<div class="product">

<img src="images/aothun.jpg">

<h3>Áo thun</h3>

<p class="price">100k</p>

<button onclick="addCart('Áo thun',100)">Thêm giỏ</button>

<button onclick="buyNow('Áo thun',100)">Mua ngay</button>

</div>


<div class="product">

<img src="images/tainghe.jpg">

<h3>Tai nghe</h3>

<p class="price">300k</p>

<button onclick="addCart('Tai nghe',300)">Thêm giỏ</button>

<button onclick="buyNow('Tai nghe',300)">Mua ngay</button>

</div>


<div class="product">

<img src="images/banphim.jpg">

<h3>Bàn phím</h3>

<p class="price">500k</p>

<button onclick="addCart('Bàn phím',500)">Thêm giỏ</button>

<button onclick="buyNow('Bàn phím',500)">Mua ngay</button>

</div>

</div>



<script>

function addCart(name,price){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({name:name,price:price})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Đã thêm vào giỏ")

}


function buyNow(name,price){

addCart(name,price)

window.location="cart.html"

}



function searchProduct(){

let input=document.getElementById("search").value.toLowerCase()

let products=document.getElementsByClassName("product")

for(let i=0;i<products.length;i++){

let name=products[i].getElementsByTagName("h3")[0].innerText.toLowerCase()

if(name.includes(input)){
products[i].style.display="block"
}else{
products[i].style.display="none"
}

}

}

</script>

</body>
</html>
