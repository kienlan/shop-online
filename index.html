```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHOP ONLINE</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#1e90ff,#00c6ff);
}

/* MENU */

nav{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
}

nav h2{
margin:0;
}

nav input{
padding:8px;
border-radius:5px;
border:none;
width:250px;
}

/* BANNER */

.banner{
height:250px;
background:url("https://picsum.photos/1200/400") center/cover;
}

/* PRODUCTS */

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:40px;
}

.product{
background:white;
width:220px;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:150px;
cursor:pointer;
}

.price{
color:red;
font-weight:bold;
}

.star{
color:gold;
}

button{
border:none;
padding:8px 12px;
margin:5px;
border-radius:5px;
cursor:pointer;
}

.cartBtn{
background:#007bff;
color:white;
}

.buy{
background:#28a745;
color:white;
}

/* CART */

.cart{
position:fixed;
top:20px;
right:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

/* CONTACT BUTTONS */

.call{
position:fixed;
bottom:20px;
left:20px;
background:#28a745;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}

.zalo{
position:fixed;
bottom:80px;
left:20px;
background:#0084ff;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

</style>

</head>

<body>

<nav>

<h2>🛒 SHOP ONLINE</h2>

<input type="text" placeholder="Tìm sản phẩm..." onkeyup="searchProduct(this.value)">

</nav>

<div class="banner"></div>

<div class="products">

<div class="product">

<h3>Áo thun</h3>

<img src="images/ao.jpg" onclick="zoom(this.src)">

<p class="price">100k</p>

<div class="star">⭐⭐⭐⭐☆</div>

<button class="cartBtn" onclick="addCart(100)">Thêm giỏ</button>

<a href="tel:0123456789"><button class="buy">Mua</button></a>

</div>


<div class="product">

<button class="cartBtn" onclick="addCart(300)">Thêm giỏ</button>

<a href="tel:0123456789"><button class="buy">Mua</button></a>

</div>


<div class="product">

<h3>Bàn phím</h3>

<p class="price">500k</p>

<div class="star">⭐⭐⭐⭐☆</div>

<button class="cartBtn" onclick="addCart(500)">Thêm giỏ</button>

</div>

</div>


<div class="cart">

🛍 Giỏ hàng

<p>Tổng: <span id="total">0</span>k</p>

</div>

<footer>

<h3>Liên hệ</h3>

<p>📞 SĐT: 0838434412</p>

<p>Zalo: 0838434412</p>

<p>https://www.facebook.com/khuatt.trung.kien</p>

</footer>


<script>

let total=0

function addCart(price){

total+=price

document.getElementById("total").innerText=total

alert("Đã thêm vào giỏ hàng")

}

function zoom(src){

let w=window.open()

w.document.write("<img src='"+src+"' style='width:100%'>")

}

function searchProduct(value){

let products=document.querySelectorAll(".product")

products.forEach(p=>{

let name=p.querySelector("h3").innerText.toLowerCase()

p.style.display=name.includes(value.toLowerCase())?"block":"none"

})

}

</script>

</body>
</html>
