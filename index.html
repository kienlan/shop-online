```html
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Online</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#5f9cff,#6be5ff);
}

/* MENU */

nav{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
}

.menu a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

.menu a:hover{
color:#00eaff;
}

/* SEARCH */

.search{
text-align:center;
margin:30px;
}

.search input{
width:300px;
padding:10px;
border-radius:20px;
border:none;
}

/* PRODUCTS */

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:35px;
padding:20px;
}

.product{
background:white;
width:230px;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.product:hover{
transform:translateY(-10px);
}

/* IMAGE ZOOM */

.product img{
width:100%;
border-radius:10px;
transition:0.3s;
}

.product img:hover{
transform:scale(1.1);
}

.price{
color:red;
font-weight:bold;
margin:8px 0;
}

.stars{
color:gold;
}

button{
background:#22c55e;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

/* CART */

.cart{
background:white;
width:350px;
margin:40px auto;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.buybtn{
background:#2563eb;
margin-top:15px;
}

.buybtn:hover{
background:#1d4ed8;
}

/* ZALO BUTTON */

.zalo{
position:fixed;
bottom:20px;
right:20px;
background:#0084ff;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

@media(max-width:700px){

.products{
flex-direction:column;
align-items:center;
}

}

</style>
</head>

<body>

<nav>
<div><b>🛍 SHOP ONLINE</b></div>

<div class="menu">
<a href="#">Trang chủ</a>
<a href="#">Sản phẩm</a>
<a href="#">Liên hệ</a>
</div>

</nav>

<div class="search">
<input type="text" id="search" placeholder="Tìm sản phẩm..." onkeyup="searchProduct()">
</div>

<div class="products" id="product-list">

<div class="product">
<h3>Áo thun</h3>
<img src="images/aothun.jpg">
<div class="stars">⭐⭐⭐⭐☆</div>
<div class="price">100k</div>
<button onclick="addToCart('Áo thun',100)">Thêm vào giỏ</button>
</div>

<div class="product">
<h3>Tai nghe</h3>
<img src="images/tainghe.jpg">
<div class="stars">⭐⭐⭐⭐⭐</div>
<div class="price">300k</div>
<button onclick="addToCart('Tai nghe',300)">Thêm vào giỏ</button>
</div>

<div class="product">
<h3>Bàn phím</h3>
<img src="images/banphim.jpg">
<div class="stars">⭐⭐⭐⭐☆</div>
<div class="price">500k</div>
<button onclick="addToCart('Bàn phím',500)">Thêm vào giỏ</button>
</div>

</div>

<div class="cart">

<h2>🛒 Giỏ hàng</h2>

<ul id="cart-list"></ul>

<div class="total">
Tổng tiền: <span id="total">0</span>k
</div>

<a href="tel:083843412">
<button class="buybtn">Mua ngay</button>
</a>

</div>

<a class="zalo" href="https://zalo.me/0838434412">💬</a>

<script>

let total=0;

function addToCart(name,price){

let list=document.getElementById("cart-list");

let item=document.createElement("li");

item.textContent=name+" - "+price+"k";

list.appendChild(item);

total+=price;

document.getElementById("total").textContent=total;

}

/* SEARCH FUNCTION */

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

let products=document.getElementsByClassName("product");

for(let i=0;i<products.length;i++){

let name=products[i].innerText.toLowerCase();

if(name.includes(input)){
products[i].style.display="block";
}else{
products[i].style.display="none";
}

}

}

</script>

</body>
</html>
