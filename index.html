```html
<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOP ONLINE</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#1e90ff,#00c6ff);
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:26px;
}

.banner{
width:100%;
height:220px;
background:url("https://picsum.photos/1200/300") center/cover;
}

.search{
text-align:center;
padding:20px;
}

.search input{
width:60%;
padding:10px;
border-radius:5px;
border:none;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:20px;
}

.product{
background:white;
width:220px;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:150px;
cursor:pointer;
}

.price{
color:red;
font-weight:bold;
}

.star{
color:gold;
}

button{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

.buy{
background:#28a745;
color:white;
}

.cartBtn{
background:#007bff;
color:white;
}

.cart{
position:fixed;
right:20px;
top:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.3);
width:220px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<header>🛒 SHOP ONLINE</header>

<div class="banner"></div>

<div class="search">
<input type="text" placeholder="Tìm sản phẩm..." onkeyup="searchProduct(this.value)">
</div>

<div class="products">

<div class="product">
<h3>Áo thun</h3>
<img src="images/aothun.jpg" onclick="zoom(this.src)">
<p class="price">100k</p>
<div class="star">⭐⭐⭐⭐☆</div>
<button class="cartBtn" onclick="addCart('Áo thun',100)">Thêm giỏ</button>
<a href="tel:0123456789"><button class="buy">Mua</button></a>
</div>

<div class="product">
<h3>Tai nghe</h3>
<img src="images/tainghe.jpg" onclick="zoom(this.src)">
<p class="price">300k</p>
<div class="star">⭐⭐⭐⭐⭐</div>
<button class="cartBtn" onclick="addCart('Tai nghe',300)">Thêm giỏ</button>
<a href="tel:0123456789"><button class="buy">Mua</button></a>
</div>

<div class="product">
<h3>Bàn phím</h3>
<img src="images/banphim.jpg" onclick="zoom(this.src)">
<p class="price">500k</p>
<div class="star">⭐⭐⭐⭐☆</div>
<button class="cartBtn" onclick="addCart('Bàn phím',500)">Thêm giỏ</button>
<a href="tel:0123456789"><button class="buy">Mua</button></a>
</div>

</div>

<div class="cart">

<h3>🛍 Giỏ hàng</h3>

<ul id="cartItems"></ul>

<p>Tổng: <span id="total">0</span>k</p>

<button onclick="openPay()">Thanh toán</button>

</div>

<div class="popup" id="payPopup">

<div class="popupBox">

<h2>Thanh toán</h2>

<p>Tổng tiền: <span id="payTotal"></span>k</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=ShopThanhToan">

<br><br>

<button onclick="pay()">Xác nhận thanh toán</button>
<br><br>

<button onclick="closePay()">Đóng</button>

</div>

</div>

<script>

let total=0

let cartData=JSON.parse(localStorage.getItem("cart"))||[]

cartData.forEach(item=>{
addItem(item.name,item.price,false)
})

function addCart(name,price){

cartData.push({name,price})

localStorage.setItem("cart",JSON.stringify(cartData))

addItem(name,price,true)

}

function addItem(name,price,update){

let li=document.createElement("li")

li.innerText=name+" - "+price+"k"

document.getElementById("cartItems").appendChild(li)

if(update){
total+=price
}else{
total+=price
}

document.getElementById("total").innerText=total

}

function zoom(src){

let w=window.open()

w.document.write("<img src='"+src+"' style='width:100%'>")

}

function searchProduct(value){

let products=document.querySelectorAll(".product")

products.forEach(p=>{

let name=p.querySelector("h3").innerText.toLowerCase()

p.style.display=name.includes(value.toLowerCase())?"block":"none"

})

}

function openPay(){

if(total==0){
alert("Giỏ hàng trống")
return
}

document.getElementById("payPopup").style.display="flex"

document.getElementById("payTotal").innerText=total

}

function closePay(){
document.getElementById("payPopup").style.display="none"
}

function pay(){

alert("Thanh toán thành công (giả lập)")

localStorage.removeItem("cart")

document.getElementById("cartItems").innerHTML=""

total=0

document.getElementById("total").innerText=0

closePay()

}

</script>
<div style="background:#111;color:white;padding:30px;margin-top:50px">

<h2>📞 Liên hệ mua hàng</h2>

<p>SĐT: 0838434412</p>

<p>Zalo: 0838434412</p>

<p>Facebook: https://www.facebook.com/khuatt.trung.kien</p>

</div>
</body>
</html>
