```html
<!DOCTYPE html>
<html>
<head>
<title>Shop của tôi</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
    margin:0;
}

h1{
    background:black;
    color:white;
    padding:20px;
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:20px;
}

.product{
    background:white;
    padding:20px;
    width:200px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
    width:150px;
}

button{
    background:green;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:darkgreen;
}

.cart{
    background:white;
    margin:20px auto;
    padding:20px;
    width:300px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.cart h2{
    margin-top:0;
}
</style>

</head>

<body>

<h1>SHOP ONLINE</h1>

<div class="products">

<div class="product">
<h3>Áo thun</h3>
<img src="images/aothun.jpg">
<p>Giá: 100k</p>
<button onclick="addToCart('Áo thun',100)">Thêm vào giỏ</button>
</div>

<div class="product">
<h3>Tai nghe</h3>
<img src="images/tainghe.jpg">
<p>Giá: 300k</p>
<button onclick="addToCart('Tai nghe',300)">Thêm vào giỏ</button>
</div>

<div class="product">
<h3>Bàn phím</h3>
<img src="images/banphim.jpg">
<p>Giá: 500k</p>
<button onclick="addToCart('Bàn phím',500)">Thêm vào giỏ</button>
</div>

</div>

<div class="cart">
<h2>🛒 Giỏ hàng</h2>
<ul id="cart-list"></ul>
<p><b>Tổng tiền:</b> <span id="total">0</span>k</p>
</div>

<script>
let total = 0;

function addToCart(name, price){
    let list = document.getElementById("cart-list");

    let item = document.createElement("li");
    item.textContent = name + " - " + price + "k";

    list.appendChild(item);

    total += price;
    document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
```
