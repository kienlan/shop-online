```html
<!DOCTYPE html>
<html>
<head>
<title>Shop của tôi</title>

<style>

body{
font-family: Arial;
background:#f3f4f6;
margin:0;
text-align:center;
}

header{
background:#111;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.products{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:40px;
}

.product{
background:white;
width:220px;
border-radius:12px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.product:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.product img{
width:100%;
border-radius:8px;
}

.price{
color:#e63946;
font-weight:bold;
margin:10px 0;
}

button{
background:#16a34a;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#15803d;
}

.cart{
background:white;
width:320px;
margin:40px auto;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.buybtn{
background:#2563eb;
margin-top:15px;
}

.buybtn:hover{
background:#1d4ed8;
}

.total{
margin-top:10px;
font-weight:bold;
font-size:18px;
}

</style>
</head>

<body>

<header>🛍 SHOP ONLINE</header>

<div class="products">

<div class="product">
<h3>Áo thun</h3>
<img src="images/aothun.jpg">
<div class="price">100k</div>
<button onclick="addToCart('Áo thun',100)">Thêm vào giỏ</button>
</div>

<div class="product">
<h3>Tai nghe</h3>
<img src="images/tainghe.jpg">
<div class="price">300k</div>
<button onclick="addToCart('Tai nghe',300)">Thêm vào giỏ</button>
</div>

<div class="product">
<h3>Bàn phím</h3>
<img src="images/banphim.jpg">
<div class="price">500k</div>
<button onclick="addToCart('Bàn phím',500)">Thêm vào giỏ</button>
</div>

</div>

<div class="cart">
<h2>🛒 Giỏ hàng</h2>
<ul id="cart-list"></ul>

<div class="total">
Tổng tiền: <span id="total">0</span>k
</div>

<a href="tel:0838434412">
<button class="buybtn">Mua ngay</button>
</a>

</div>

<script>

let total = 0;

function addToCart(name,price){

let list=document.getElementById("cart-list");

let item=document.createElement("li");
item.textContent=name+" - "+price+"k";

list.appendChild(item);

total+=price;
document.getElementById("total").textContent=total;

}

</script>

</body>
</html>
