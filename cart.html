```html
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Giỏ hàng</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>🛒 Giỏ hàng</h2>

<ul id="cartList"></ul>

<p>Tổng: <span id="total"></span>k</p>

<button onclick="pay()">Thanh toán</button>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[]

let total=0

cart.forEach(item=>{

let li=document.createElement("li")

li.innerText=item.name+" - "+item.price+"k"

document.getElementById("cartList").appendChild(li)

total+=item.price

})

document.getElementById("total").innerText=total

function pay(){

alert("Thanh toán thành công (giả lập)")

localStorage.removeItem("cart")

location.reload()

}

</script>

</body>
</html>
```
