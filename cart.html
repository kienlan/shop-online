<!DOCTYPE html>
<html>
<head>
<title>Giỏ hàng</title>
</head>

<body>

<h1>🛒 Giỏ hàng</h1>

<ul id="cart"></ul>

<h2 id="total"></h2>

<button onclick="clearCart()">Xóa giỏ</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

let list = document.getElementById("cart")

let total = 0

cart.forEach(item=>{

let li=document.createElement("li")

li.innerText=item.name+" - "+item.price+"k"

list.appendChild(li)

total+=item.price

})

document.getElementById("total").innerText="Tổng tiền: "+total+"k"


function clearCart(){

localStorage.removeItem("cart")

location.reload()

}

</script>

</body>
</html>
